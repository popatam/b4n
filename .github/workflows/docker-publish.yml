name: Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: node
            suffix: node
            description: Blockchain runtime only
          - target: web
            suffix: web
            description: Blockchain runtime with web UI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}-${{ matrix.suffix }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Print published image links
        env:
          PACKAGE_PAGE: ${{ github.server_url }}/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}-${{ matrix.suffix }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "Published ${PACKAGE_PAGE}"
          printf '%s\n' "${IMAGE_TAGS}"
          {
            echo "### ${IMAGE_TAGS%%$'\n'*}"
            echo
            echo "Package page: ${PACKAGE_PAGE}"
            echo
            echo "Published tags:"
            printf '%s\n' "${IMAGE_TAGS}" | sed 's/^/- /'
          } >> "${GITHUB_STEP_SUMMARY}"
